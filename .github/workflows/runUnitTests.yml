name: Unit Test

on:
  push:
    branches:
      - master
      - '**' # All feature branches

  pull_request:
    branches:
      - master 
      - '**'

  # Allows you to run the workflow manually from the Actions tab in GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/friendex.sln

      - name: Build the solution
        run: dotnet build ./src/friendex.sln --configuration Release --no-restore # Have this checked.

      - name: Run unit tests with report 
        run: dotnet test ./src/Friendex_Test/Friendex_Test.csproj --configuration Release --no-build --logger "trx;LogFileName=TestResults.trx"

      # This part is optional
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: ./src/Test/TestResults/TestResults.trx