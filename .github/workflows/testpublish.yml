    #         echo 'docfiles have changed'




    # JOB to build and package an APK and publish to Releases
    build-android:
        # needs: changes
        # if: ${{ needs.changes.outputs.projectfiles == 'true' || needs.changes.outputs.gitfiles == 'true' }}
        # Declare dependency on the versioning job so its artifact is available
        needs: version
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4


            - name: Download VERSION artifact
              uses: actions/download-artifact@v4
              with:
                name: version-file   # Must match the upload-artifact name in the versioning job
                path: ./artifacts    # Downloads VERSION file to ./artifacts/VERSION
              
            - name: Read version into env
              shell: bash
              run: echo "APP_VERSION=$(cat ./artifacts/VERSION)" >> "$GITHUB_ENV"
            
            - name: Download MAJOR artifact
              uses: actions/download-artifact@v4
              with:
                name: major-file   # Must match the upload-artifact name in the versioning job
                path: ./artifacts    # Downloads MAJOR file to ./artifacts/MAJOR
              
            - name: Read major into env
              shell: bash
              run: echo "APP_VERSION_MAJOR=$(cat ./artifacts/MAJOR)" >> "$GITHUB_ENV"

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: '10.0.x'

            - name: Install MAUI workload
              run: dotnet workload install maui

            - name: Build and Publish APK
              run: >-
                  dotnet publish
                  -f net10.0-android
                  -c Release
                  -p:AndroidPackageFormat=apk
                  -p:ApplicationVersion=${{ env.APP_VERSION_MAJOR }}
                  -p:ApplicationDisplayVersion=${{ env.APP_VERSION }}

            - name: List build output
              run: ls -R ./**/*-Signed.apk


            - name: 'package release'
            #gh release create ${{ github.ref_name }}-release-v${{ github.run_number }} -p --target ${{ GitHub.ref }}
            #gh release upload ${{ github.ref_name }}-release-v${{ github.run_number }} ${{ env.RELEASE_PATH }}${{ env.APP_NAME }}${{ env.APP_SUFFIX }}
              run: |
                gh release list
                echo ''
                gh release create "$APP_VERSION" \
                  --prerelease \
                  --target "$GITHUB_REF" \
                  --title "Release $APP_VERSION" \
                  --notes "Branch: $GITHUB_REF_NAME | Commit: $GITHUB_SHA"

                echo ''
                gh release upload "$APP_VERSION" \
                  "${{ env.RELEASE_PATH }}${{ env.APP_NAME }}${{ env.APP_SUFFIX }}"
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash


