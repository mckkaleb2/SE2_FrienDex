name: 'Build, Publish, Release - MAUI CI/CD'
on:
    push:
        branches: ["workflow-building"]
    pull_request:
        branches: ["workflow-building"]

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Make sure the GITHUB_TOKEN has permission to upload to our releases
permissions:
  contents: write

env:
    APP_NAME: com.companyname.friendex
    RELEASE_PATH: FrienDex/bin/Release/net10.0-android/
    APP_SUFFIX: -Signed.apk

jobs:
    build-android:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: '10.0.x'

            # TODO: Add a paths changed filter here
            # Relevant Files/Paths to monitor for changes:
                # \.github\workflows\*
                # \FrienDex\*
                # .gitignore
                # FrienDex.slnx


            - name: Install MAUI workload
              run: dotnet workload install maui

            - name: Build and Publish APK
              run:
                  dotnet publish
                  -f net10.0-android
                  -c Release
                  -p:AndroidPackageFormat=apk
                  #-p:ApplicatonVersion=
                  #-p:ApplicatonDisplayVersion=

            - name: List build output
              run: ls -R ./**/*-Signed.apk


            - name: 'package release'
              run: |
                gh release list
                echo ''
                gh release create ${{ github.ref_name }}-release-v${{ github.run_number }} -p --target ${{ GitHub.ref }}
                echo ''
                gh release upload ${{ github.ref_name }}-release-v${{ github.run_number }} ${{ env.RELEASE_PATH }}${{ env.APP_NAME }}${{ env.APP_SUFFIX }}
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              shell: bash


