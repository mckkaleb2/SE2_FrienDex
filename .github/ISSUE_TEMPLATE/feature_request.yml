# Adapted from electron/electron 's repository
## https://github.com/electron/electron/blob/main/.github/ISSUE_TEMPLATE/feature_request.yml
#
# Created during research on Community Health Files for GitHub: https://docs.github.com/en/communities/setting-up-your-project-for-healthy-contributions/creating-a-default-community-health-file
# TODO: Complete adapting form
name: Feature Request
description: Suggest an idea for FrienDex
type: 'enhancement'
labels: "enhancement :sparkles:"
body:
- type: checkboxes
  attributes:
    label: Preflight Checklist
    description: Please ensure you've completed all of the following.
    options:
      - label: I have read the [Contributing Guidelines](https://github.com/mckkaleb2/SE2_FrienDex/blob/main/CONTRIBUTING.md) for this project.
        required: true
      # Code of Conduct needs some work
      - label: I agree to follow the [Code of Conduct](https://github.com/mckkaleb2/SE2_FrienDex/blob/main/CODE_OF_CONDUCT.md) that this project adheres to.
        required: true
      - label: I have searched the [issue tracker](https://www.github.com/mckkaleb2/SE2_FrienDex/issues) for a feature request that matches the one I want to file, without success.
        required: true
- type: textarea
  attributes:
    label: Problem Description
    description: Please add a clear and concise description of the problem you are seeking to solve with this feature request.
  validations:
    required: true
- type: textarea
  attributes:
    label: Proposed Solution
    description: Describe the solution you'd like in a clear and concise manner.
  validations:
    required: true
- type: textarea
  attributes:
    label: Alternatives Considered
    description: A clear and concise description of any alternative solutions or features you've considered.
  validations:
    required: true
- type: textarea
  attributes:
    label: Additional Information
    description: Add any other context about the problem here.
  validations:
    required: false